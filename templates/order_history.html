{% extends 'base.html' %}
{% load static %}

{% block title %}My Orders - WildSport{% endblock %}

{% block content %}
<div class="container my-4">
    <h1 class="mb-4">My Orders</h1>
    <div id="alert-box"></div>

    <div id="orders-loading" class="text-center py-5">
        <div class="spinner-border" style="color: var(--primary);"></div>
        <p class="mt-2 small-text">Loading your orders...</p>
    </div>

    <div id="orders-empty" style="display:none;" class="text-center py-5">
        <i class="bi bi-bag-x" style="font-size: 50px; color: var(--border);"></i>
        <h3 class="mt-3">No orders yet</h3>
        <p class="small-text">Your placed orders will show up here.</p>
        <a href="{% url 'product-listing' %}" class="btn-primary-custom">Start Shopping</a>
    </div>

    <div id="orders-list"></div>
</div>

<script>
function getToken() { return localStorage.getItem('wildsport_token'); }

function showAlert(message, type) {
    document.getElementById('alert-box').innerHTML = `<div class="alert alert-${type}">${message}</div>`;
}

const statusColors = {
    pending: '#F57C00',
    confirmed: '#1565C0',
    shipped: '#6DBE45',
    delivered: '#0F4C3A',
    cancelled: '#DC2626'
};

function loadOrders() {
    const token = getToken();
    if (!token) {
        document.getElementById('orders-loading').style.display = 'none';
        showAlert('Please login to view your orders.', 'warning');
        setTimeout(openAuthModal, 500);
        return;
    }

    fetch('/api/orders/', { headers: { 'Authorization': 'Token ' + token } })
    .then(res => res.json())
    .then(orders => {
        document.getElementById('orders-loading').style.display = 'none';

        if (!orders || orders.length === 0) {
            document.getElementById('orders-empty').style.display = 'block';
            return;
        }

        document.getElementById('orders-list').innerHTML = orders.map(order => {
            const color = statusColors[order.status] || '#6B7280';
            const firstItem = order.items[0];
            const itemImg = (firstItem && firstItem.product_detail && firstItem.product_detail.images.length > 0)
                ? firstItem.product_detail.images[0].image : 'https://via.placeholder.com/60x60?text=No+Image';

            return `
            <a href="/orders/${order.id}/" class="text-decoration-none">
                <div class="order-card">
                    <img src="${itemImg}" alt="order">
                    <div class="flex-grow-1">
                        <div class="d-flex justify-content-between align-items-start flex-wrap">
                            <div>
                                <strong>${order.order_number}</strong>
                                <p class="small-text mb-1">${order.items.length} item(s) • Placed on ${new Date(order.created_at).toLocaleDateString('en-IN', {day:'numeric', month:'short', year:'numeric'})}</p>
                            </div>
                            <span class="order-status-badge" style="background:${color};">${order.status.toUpperCase()}</span>
                        </div>
                        <div class="price mt-2">₹${order.total_amount}</div>
                    </div>
                    <i class="bi bi-chevron-right" style="color: #9CA3AF;"></i>
                </div>
            </a>`;
        }).join('');
    })
    .catch(() => {
        document.getElementById('orders-loading').style.display = 'none';
        showAlert('Failed to load orders.', 'danger');
    });
}

document.addEventListener('DOMContentLoaded', loadOrders);
</script>
{% endblock %}
